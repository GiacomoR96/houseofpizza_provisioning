apiVersion: v1
kind: Service
metadata:
  name: houseofpizza-service
spec:
  selector:
    app: houseofpizza
  ports:
    - protocol: TCP
      port: 4001  # Port on which the service will be displayed
      targetPort: 4001  # Internal pod port
  type: LoadBalancer  # Tipe of service (ClusterIP, NodePort, ecc.)
